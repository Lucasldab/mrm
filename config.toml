viewer = "rv"

[sources.mangadex]
base_url = "https://api.mangadex.org"
enabled = true

[sources.mangack]
base_url = "https://mangack.com"
enabled = true

[sources.asura]
base_url = "https://asurascans.com"
enabled = true
scraper_dir = "/home/projects/mrm"

[notifications]
enabled = true
poll_interval_minutes = 30

[db]
path = "mrm.db"

[rv]
scroll_speed = 80
fast_scroll_speed = 600
fullscreen = true

[rv.binds]
e = "scroll_down"
u = "scroll_up"
q = "quit"
